name: Lesson 31
run-name: Tests run
on: workflow_dispatch
jobs:
  firstJob:
    name: "Run tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker Image
        run: docker build -t my-cypress-app .
      - name: NPM Install
        run: npm install
      - name: run tests
        run: npx cypress run --browser firefox --config-file cypress.prod.cjs
